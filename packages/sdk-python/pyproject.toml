[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "sayknowmind"
version = "0.1.0"
description = "Official Python SDK for SayknowMind Agentic Second Brain"
license = {text = "MIT"}
requires-python = ">=3.9"
dependencies = ["httpx>=0.27.0"]

[project.optional-dependencies]
dev = ["pytest>=8.0", "hypothesis>=6.0"]
