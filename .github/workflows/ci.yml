name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sayknowmind

jobs:
  # ── Stage 1: Lint + Test + Build (Web) ─────────────────────
  lint-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Lint
        working-directory: apps/web
        run: pnpm lint

      - name: Test
        working-directory: apps/web
        run: pnpm test

      - name: Build
        working-directory: apps/web
        run: pnpm build

  # ── Stage 2: Docker Build + Push ───────────────────────────
  docker-images:
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: web
            context: ./apps/web
            dockerfile: ./apps/web/Dockerfile
          - name: ai-server
            context: ./apps/ai-server
            dockerfile: ./apps/ai-server/Dockerfile
          - name: dashboard
            context: ./apps/dashboard
            dockerfile: ./apps/dashboard/Dockerfile
          - name: mcp-server
            context: ./packages/mcp-server
            dockerfile: ./packages/mcp-server/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Stage 3: DB Migration Check ────────────────────────────
  migration-check:
    runs-on: ubuntu-latest
    needs: lint-test-build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: sayknowmind_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Run init scripts
        env:
          PGPASSWORD: testpass
        run: |
          for f in db/init/*.sql; do
            echo "Running $f..."
            psql -h localhost -U postgres -d sayknowmind_test -f "$f" 2>&1 || true
          done

      - name: Run migrations
        env:
          PGPASSWORD: testpass
        run: |
          for f in db/migrations/*.sql; do
            echo "Running migration: $f"
            psql -h localhost -U postgres -d sayknowmind_test -f "$f"
          done
          echo "All migrations passed"
