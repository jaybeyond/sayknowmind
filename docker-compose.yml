version: "3.8"

services:
  # === DATABASE ===
  postgres:
    build:
      context: ./docker
      dockerfile: Dockerfile.postgres
    container_name: sayknowmind-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: sayknowmind
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init/01-edgequake-init.sql:/docker-entrypoint-initdb.d/01-edgequake.sql
      - ./db/init/03-init-extensions.sql:/docker-entrypoint-initdb.d/02-extensions.sql
      - ./db/init/02-init-age-db.sh:/docker-entrypoint-initdb.d/03-age-db.sh
      - ./db/init/07-better-auth.sql:/docker-entrypoint-initdb.d/03b-better-auth.sql
      - ./db/init/04-sayknowmind-init.sql:/docker-entrypoint-initdb.d/04-sayknowmind.sql
      - ./db/init/05-ingestion-jobs.sql:/docker-entrypoint-initdb.d/05-ingestion-jobs.sql
      - ./db/init/06-privacy-levels.sql:/docker-entrypoint-initdb.d/06-privacy-levels.sql
      - ./db/init/08-relay-sync.sql:/docker-entrypoint-initdb.d/08-relay-sync.sql
      - ./db/init/09-sync-ledger.sql:/docker-entrypoint-initdb.d/09-sync-ledger.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sayknowmind

  # === CACHE ===
  redis:
    image: redis:7-alpine
    container_name: sayknowmind-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - sayknowmind

  # === BACKEND ENGINES ===
  edgequake:
    build:
      context: ./packages/edgequake
      dockerfile: docker/Dockerfile
    container_name: sayknowmind-edgequake
    ports:
      - "${EDGEQUAKE_PORT:-8080}:8080"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/sayknowmind
      RUST_LOG: ${RUST_LOG:-info}
      EDGEQUAKE_DEFAULT_LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EDGEQUAKE_DEFAULT_LLM_MODEL: ${LLM_MODEL:-Qwen/Qwen3.5-0.8B}
      EDGEQUAKE_DEFAULT_EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EDGEQUAKE_DEFAULT_EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      OLLAMA_HOST: http://ollama:11434
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sayknowmind

  ocr-server:
    build:
      context: ./apps/ai-server/ocr-server
      dockerfile: Dockerfile.ocr
    container_name: sayknowmind-ocr
    restart: unless-stopped
    networks:
      - sayknowmind

  ai-server:
    build:
      context: ./apps/ai-server
      dockerfile: Dockerfile
    container_name: sayknowmind-ai-server
    ports:
      - "${AI_SERVER_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_URL: redis://redis:6379
      OLLAMA_URL: http://ollama:11434
      OCR_ENDPOINT: http://ocr-server:8000
      SEARXNG_URL: http://searxng:8888
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 100
    volumes:
      - model_cache:/app/models
    depends_on:
      - ollama
      - redis
      - ocr-server
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - sayknowmind

  # === FRONTEND APPS ===
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sayknowmind-web
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/sayknowmind
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_DEPLOY_MODE: ${NEXT_PUBLIC_DEPLOY_MODE:-cloud}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      EDGEQUAKE_URL: http://edgequake:8080
      EDGEQUAKE_API_KEY: ${EDGEQUAKE_API_KEY:-}
      AI_SERVER_URL: http://ai-server:4000
      AI_API_KEY: ${AI_API_KEY:-}
      IPFS_KUBO_API: http://ipfs:5001
      IPFS_GATEWAY: http://ipfs:8080/ipfs
    depends_on:
      postgres:
        condition: service_healthy
      edgequake:
        condition: service_healthy
      ai-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sayknowmind

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: sayknowmind-dashboard
    ports:
      - "${DASHBOARD_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:${EDGEQUAKE_PORT:-8080}
    depends_on:
      - edgequake
    restart: unless-stopped
    networks:
      - sayknowmind

  # === AI INFRASTRUCTURE ===
  ollama:
    image: ollama/ollama:latest
    container_name: sayknowmind-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0
    restart: unless-stopped
    networks:
      - sayknowmind

  searxng:
    image: searxng/searxng:latest
    container_name: sayknowmind-searxng
    ports:
      - "${SEARXNG_PORT:-8888}:8080"
    volumes:
      - ./docker/searxng/settings.yml:/etc/searxng/settings.yml:ro
    environment:
      SEARXNG_BASE_URL: http://localhost:${SEARXNG_PORT:-8888}/
    restart: unless-stopped
    networks:
      - sayknowmind

  # === MCP SERVER ===
  mcp-server:
    build:
      context: ./packages/mcp-server
      dockerfile: Dockerfile
    container_name: sayknowmind-mcp
    ports:
      - "${MCP_PORT:-8082}:8082"
    environment:
      EDGEQUAKE_URL: http://edgequake:8080
      AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      - edgequake
    restart: unless-stopped
    networks:
      - sayknowmind

  # === CLOUD RELAY (Encrypted Offline Sync) ===
  relay-server:
    build:
      context: ./packages/relay-server
      dockerfile: Dockerfile
    container_name: sayknowmind-relay
    ports:
      - "${RELAY_PORT:-3200}:3200"
    environment:
      NODE_ENV: production
      PORT: 3200
      RELAY_SHARED_SECRET: ${RELAY_SHARED_SECRET}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/sayknowmind
      PURGE_INTERVAL_MS: 900000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3200/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sayknowmind

  # === IPFS KUBO (Decentralized Storage for Shared Mode) ===
  ipfs:
    image: ipfs/kubo:latest
    container_name: sayknowmind-ipfs
    ports:
      - "${IPFS_API_PORT:-5001}:5001"
      - "${IPFS_GATEWAY_PORT:-8180}:8080"
    volumes:
      - ipfs_data:/data/ipfs
    environment:
      IPFS_PROFILE: server
    healthcheck:
      test: ["CMD-SHELL", "ipfs dag stat /ipfs/QmUNLLsPACCz1vLxQVkXqqLX5R1X345qqfHbsf67hvA3Nn || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - sayknowmind

volumes:
  db_data:
    driver: local
  model_cache:
    driver: local
  ollama_data:
    driver: local
  user_data:
    driver: local
  ipfs_data:
    driver: local

networks:
  sayknowmind:
    driver: bridge
